<html>
    <head>
        <title>Đại học khoa học tự nhiên</title>
    </head>
    <body>
        <h1>Register Form</h1>

        <form>
            <input type="text" id="username" name="username" placeholder="Username" /><br>

            <input type="password" id="password" name="password" /><br>

            <input type="email" id="email" name="email" /><br>

            <input type="number" id="age" name="age" /><br>
            
            <input type="radio" id="gender" name="gender" value="M" /> Male
            <input type="radio" id="gender" name="gender" value="F" /> Female
            <input type="radio" id="gender" name="gender" value="O" /> Other <br>

            <textarea name="description" rows="10" cols="50"> Nội dung mô tả </textarea><br>

            <select name="country">
                <option value="EN">England</option>
                <option value="VN" selected>Vietnam</option>
                <option value="JP">Japan</option>
            </select>

            <input type="checkbox" id="remember" name="remember" value="true" /> Remember?<br>
            <button onclick="alert('Bạn đã đăng ký thành công')">Đăng ký</button>
        </form>
    </body>
</html>
