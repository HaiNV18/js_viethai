<html>
    <head>
        <title>Đại học khoa học tự nhiên</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <table id="tableForm" style="width: 1000px;">
            <tr>
                <th style="width: 30%">Component</th>
                <th>Display</th>
            </tr>
            <tr>
                <td class="txtCenter">Input Text</td>
                <td>
                    <input type="text" id="ipText" name="ipText" />
                </td>
            </tr>
            <tr>
                <td class="txtCenter">Textarea</td>
                <td>
                    <textarea name="textArea" rows="4" cols="50"></textarea>
                </td>
            </tr>
            <tr>
                <td class="txtCenter">Button</td>
                <td>
                    <button>Click Me</button>
                </td>
            </tr>
            <tr>
                <td class="txtCenter">Radio button</td>
                <td>
                    <input type="radio" id="opt" name="opt" value="1" /> Option 1 <br>
                    <input type="radio" id="opt" name="opt" value="2" /> Option 2 <br>
                    <input type="radio" id="opt" name="opt" value="3" /> Option 3 <br>
                </td>
            </tr>
            <tr>
                <td class="txtCenter">Checkbox</td>
                <td>
                    <input type="checkbox" id="cbx" name="cbx" value="1" /> Option 1 <br>
                    <input type="checkbox" id="cbx" name="cbx" value="2" /> Option 2 <br>
                    <input type="checkbox" id="cbx" name="cbx" value="3" /> Option 3 <br>
                </td>
            </tr>
            <tr>
                <td class="txtCenter">Dropdown List</td>
                <td>
                    <select id="dropdown" name="dropdown">
                        <option value="volvo">Volvo</option>
                        <option value="bmw">BMW</option>
                        <option value="camry">Camry</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td class="txtCenter">File select</td>
                <td>
                    <input type="file" id="uploadImage" name="uploadImage" />
                </td>
            </tr>
        </table>
    </body>
</html>
