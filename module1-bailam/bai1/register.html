<html>
    <head>
        <title>Login Form</title>
    </head>
    <body>

        <form>
            <input type="text" placeholder="fullname" /><br>

            <input type="text" placeholder="username or email" /><br>

            <input type="password" placeholder="password" /><br>
            
            <input type="number" placeholder="age" /><br>
            
            <input type="email" placeholder="email" /><br>

            <textarea rows="10" cols="50">Mô tả</textarea><br>

            <p>Quốc tịch</p>

            <select>
                <option>EN</option>
                <option>JP</option>
                <option>KR</option>
                <option>VN</option>
            </select>

            <p>Giới tính</p>
            <input type="radio" name="sex" value="male" />Nam
            <input type="radio" name="sex" value="female" />Nữ<br>

            <p>Ngôn ngữ</p>
            <input type="checkbox" name="language_en" value="en" />Tiếng Anh
            <input type="checkbox" name="language_jp" value="en" />Tiếng Nhật
            <input type="checkbox" name="language_kr" value="en" />Tiếng Hàn
            <input type="checkbox" name="language_vn" value="vn" />Tiếng Việt<br>

            <button type="submit" onclick="alert('đăng ký thành công')">Đăng ký</button>
        </form>
    </body>
</html>
